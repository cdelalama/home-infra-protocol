hosts:
  - id: nas
    name: NAS
    role: storage and services
    ip: 10.0.0.10

  - id: home-automation
    name: Home Automation Host
    role: home automation
    ip: 10.0.0.20

services:
  - id: infra
    name: Infra Portal
    category: infra
    url: https://infra.example.internal/
    interface: web
    host_id: nas
    runtime: docker
    image: infra-portal:0.1.0
    tags: [portal, catalog]
    description: Example internal infrastructure portal.
    status:
      type: http
      url: https://infra.example.internal/api/health
      timeout_ms: 2000
      expect_status: 200
    # Deployment evidence — Scenario "own app + endpoint" (see
    # docs/DEPLOYMENT_EVIDENCE_PROPOSAL.md). Image tag drift detected by
    # comparing `expected.image` to the running container's image; version
    # drift detected by GETting `expected.health.url` and reading the
    # `expected.health.version_json_path` value. Catalog expresses intent;
    # the consumer reads evidence. Never edit this block to match observed
    # reality (anti-pattern #1 in the proposal).
    deployment:
      expected:
        image: infra-portal:0.1.0
        health:
          url: https://infra.example.internal/api/health
          version_json_path: $.version
          version: 0.1.0

  - id: home-dashboard
    name: Home Dashboard
    category: automation
    url: https://home.example.internal/
    interface: web
    fallback_url: http://10.0.0.20:8123/
    host_id: home-automation
    runtime: docker
    image: ghcr.io/example/home-dashboard:latest
    tags: [home, automation]
    deps: [infra]
    description: Example home automation dashboard.
    status:
      type: http
      url: https://home.example.internal/
      timeout_ms: 2000
    # Deployment evidence — Scenario "third-party with HTTP UI". The
    # service has no version-bearing endpoint, so `expected.health` is
    # omitted; only `expected.image` is declared and a consumer can warn
    # if the running container's image digest drifts from the expected
    # tag. `latest` is used here on purpose to model the case where a
    # tag is mutable and the only reliable evidence is the digest.
    deployment:
      expected:
        image: ghcr.io/example/home-dashboard:latest

  - id: example-mqtt
    name: Example MQTT Broker
    category: infra
    url: mqtt://broker.example.internal:1883
    interface: mqtt
    host_id: home-automation
    runtime: docker
    image: eclipse-mosquitto:2.0
    tags: [mqtt, broker, shared]
    description: |
      Example MQTT broker. Demonstrates a non-web service whose URL is not
      browser-navigable; consumers MUST honour `interface: mqtt` to render it
      correctly (connection-string copy instead of an "open" button).
    status:
      type: tcp
      host: broker.example.internal
      port: 1883
      timeout_ms: 2000
    # Deployment evidence — Scenario "third-party, TCP only". Brokers
    # have no HTTP version endpoint, so `expected.health` is omitted.
    # Only `expected.image` is declared; a consumer can detect drift if
    # the running container's image differs from the expected tag.
    deployment:
      expected:
        image: eclipse-mosquitto:2.0

  - id: example-api
    name: Example REST API
    category: tools
    # `interface: api` is REQUIRED here per SPEC.md *Service / interface*: the
    # URL is HTTPS but the service does not serve HTML, so the implicit `web`
    # default would be wrong. This is the rule clarified in 0.3.1 to close
    # DF-004 — HTTP APIs without HTML (MCP, REST, GraphQL, JSON-RPC) MUST
    # declare `interface: api`.
    url: https://api.example.internal/v1
    interface: api
    host_id: nas
    runtime: docker
    tags: [api, rest]
    description: |
      Example HTTP service with no HTML UI. The status probe is still HTTP
      (e.g. /v1/health), but the service should not render an "open in a tab"
      affordance because there is no human-facing page at the URL.
    status:
      type: http
      url: https://api.example.internal/v1/health
      timeout_ms: 2000
      expect_status: 200
